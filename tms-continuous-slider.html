<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TMS – Continuous Scroll</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #f5f0eb;
      --dark:  #1a1a18;
      --red:   #8b1a2f;
      --muted: #9a9590;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      height: 100vh;
      overflow: hidden;
    }

    /* ══ WRAPPER ══ */
    .page {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ══ LEFT PANEL ══ */
    .left {
      width: 44%;
      min-width: 360px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 64px;
      position: relative;
      flex-shrink: 0;
      z-index: 2;
    }
    .left::after {
      content:'';
      position:absolute; right:0; top:12%; bottom:12%;
      width:1px;
      background: linear-gradient(to bottom, transparent, #ccc 30%, #ccc 70%, transparent);
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 4.2vw, 60px);
      line-height: 1.08;
      color: var(--dark);
      margin-bottom: 22px;
    }
    h1 em {
      font-style: italic;
      color: var(--red);
    }
    .desc {
      font-size: 13.5px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 320px;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      border: 1.5px solid var(--dark);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dark);
      cursor: pointer;
      background: transparent;
      transition: background .3s, color .3s;
      width: fit-content;
    }
    .btn:hover { background: var(--dark); color: var(--cream); }

    /* ══ RIGHT PANEL  ══ */
    .right {
      flex: 1;
      display: flex;
      gap: 8px;
      padding: 0 0 0 24px;
      overflow: hidden;
      align-items: flex-start;
    }

    /* ══ COLUMN ══ */
    .col {
      flex: 1;
      overflow: hidden;
      height: 100vh;
    }

    /* The inner track — doubled for seamless loop */
    .track {
      display: flex;
      flex-direction: column;
      gap: 8px;
      will-change: transform;
    }

    /* col-1: scroll UP  */
    .col:nth-child(1) .track { animation: scrollUp   28s linear infinite; }
    /* col-2: scroll DOWN */
    .col:nth-child(2) .track { animation: scrollDown 22s linear infinite; }
    /* col-3: scroll UP (slower) */
    .col:nth-child(3) .track { animation: scrollUp   34s linear infinite; }

    /* Pause on hover */
    .col:hover .track { animation-play-state: paused; }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    @keyframes scrollDown {
      0%   { transform: translateY(-50%); }
      100% { transform: translateY(0); }
    }

    /* ══ IMAGE CARD ══ */
    .card {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .card img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform .5s ease;
    }
    .card:hover img { transform: scale(1.04); }

    /* varied heights */
    .card.h-s img { height: 160px; }
    .card.h-m img { height: 220px; }
    .card.h-l img { height: 290px; }

    /* subtle overlay on hover */
    .card::after {
      content:'';
      position:absolute; inset:0;
      background: rgba(139,26,47,0);
      transition: background .3s;
    }
    .card:hover::after { background: rgba(139,26,47,0.08); }

    /* ══ FADE EDGES ══ */
    .right::before,
    .right::after {
      content:'';
      position:absolute;
      left:44%; right:0;
      height:80px;
      z-index:3;
      pointer-events:none;
    }
    .right::before {
      top:0;
      background: linear-gradient(to bottom, var(--cream), transparent);
    }
    .right::after {
      bottom:0;
      background: linear-gradient(to top, var(--cream), transparent);
    }
    .page { position: relative; }
  </style>
</head>
<body>

<div class="page">

  <!-- ══ LEFT ══ -->
  <div class="left">
    <p class="eyebrow">Creative Studio · Est. 2018</p>
    <h1>
      Grow Faster<br>
      With <em>Design</em><br>
      That Converts
    </h1>
    <p class="desc">
      At TMS, we are the architects of brand journeys, blending vision with
      strategy to craft narratives that resonate. Every project begins with
      a spark of inspiration, nurtured by collaboration and refined by bold,
      innovative thinking.
    </p>
    <button class="btn">Get In Touch</button>
  </div>

  <!-- ══ RIGHT – 3 continuous columns ══ -->
  <div class="right">

    <!-- Column 1 – scrolls UP -->
    <div class="col">
      <div class="track" id="col1">
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1541354329998-f4d9a9f9297f?w=400&q=80" alt=""/></div>
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=400&q=80" alt=""/></div>
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1600508774634-4e11d34730e2?w=400&q=80" alt=""/></div>
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80" alt=""/></div>
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1547658719-da2b51169166?w=400&q=80" alt=""/></div>
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1512486130939-2c4f79935e4f?w=400&q=80" alt=""/></div>
      </div>
    </div>

    <!-- Column 2 – scrolls DOWN -->
    <div class="col">
      <div class="track" id="col2">
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=400&q=80" alt=""/></div>
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=400&q=80" alt=""/></div>
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=400&q=80" alt=""/></div>
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&q=80" alt=""/></div>
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1553484771-371a605b060b?w=400&q=80" alt=""/></div>
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1568992687947-868a62a9f521?w=400&q=80" alt=""/></div>
      </div>
    </div>

    <!-- Column 3 – scrolls UP (slow) -->
    <div class="col">
      <div class="track" id="col3">
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1520923642038-b4259acecbd7?w=400&q=80" alt=""/></div>
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=400&q=80" alt=""/></div>
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=400&q=80" alt=""/></div>
        <div class="card h-s"><img src="https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?w=400&q=80" alt=""/></div>
        <div class="card h-l"><img src="https://images.unsplash.com/photo-1581291518857-4e27b48ff24e?w=400&q=80" alt=""/></div>
        <div class="card h-m"><img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400&q=80" alt=""/></div>
      </div>
    </div>

  </div>
</div>

<script>
  // Duplicate each track's children for seamless infinite loop
  ['col1','col2','col3'].forEach(id => {
    const track = document.getElementById(id);
    const clone = track.innerHTML;
    track.innerHTML += clone; // double the content
  });
</script>

</body>
</html>
