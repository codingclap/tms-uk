<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Mega Menu</title>
    <link rel="stylesheet" href="assets/css/flowbite.min.css" />
    <link rel="stylesheet" href="assets/css/tailwind.min.css" />
    <link rel="stylesheet" href="assets/css/universal.css" />
</head>

<body class="bg-gradient-to-br from-indigo-500 to-pink-700 via-blue-800 antialiased bg-no-repeat text-white h-screen">

    <header class="container mx-auto py-6 px-4 flex items-center justify-between">
        <a href="/" class="font-bold text-white text-xl">Pepsi</a>

        <nav>
            <ul class="flex items-center justify-center font-semibold">
                <li class="relative group px-3 py-2">
                    <button class="hover:opacity-50 cursor-default">Products</button>
                    <div
                        class="absolute top-0 left-0 transition group-hover:translate-y-5 translate-y-0 opacity-0 invisible group-hover:opacity-100 group-hover:visible duration-500 ease-in-out group-hover:transform z-50 min-w-[560px] transform">
                        <div class="relative top-6 p-6 bg-white rounded-xl shadow-xl w-full">
                            <p>Products Menu</p>
                        </div>

                    </div>
                </li>
                <li class="relative group px-3 py-2">
                    <button class="hover:opacity-50 cursor-default">Solutions</button>
                    <div class="absolute top-0 left-0 transition"></div>
                </li>
                <li class="relative group px-3 py-2">
                    <button class="hover:opacity-50 cursor-default">Developers</button>
                    <div class="absolute top-0 left-0 transition"></div>
                </li>
                <li class="relative group px-3 py-2">
                    <button class="hover:opacity-50 cursor-default">Resources</button>
                    <div class="absolute top-0 left-0 transition"></div>
                </li>
                <li class="relative group px-3 py-2">
                    <a href="#" class="hover:opacity-50 cursor-default">Pricing</a>

                </li>
            </ul>
        </nav>
        <nav>
            <ul>
                <li>
                    <a href="#"
                        class="rounded-full px-3 py-2 font-semibold bg-white bg-opacity-10 flex items-center group">
                        <span class="mr-2">Sign in</span>
                        <svg class="stroke-current" width="10" height="10" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true" viewBox="0 0 10 10">
                            <path class="opacity-0 group-hover:opacity-100 transition ease-in-out duration-200"
                                d="M0.5 5.5h7"></path>
                            <path
                                class="opacity-100 group-hover:transform duration-200 group-hover:translate-x-1 ease-in-out duration-200"
                                d="M1.5 1.5l4 4-4 4">
                            </path>
                        </svg>
                    </a>

                </li>

            </ul>

        </nav>
    </header>




    <script src="assets/js/flowbite.min.js"></script>

</body>

</html>
